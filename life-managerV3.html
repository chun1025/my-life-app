<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="/my-life-app/manifest.json">
<title>我的生活管理</title>
<style>
:root{
  --purple:#534AB7;--purple-light:#EEEDFE;--purple-dark:#3C3489;
  --teal:#0F6E56;--teal-light:#E1F5EE;
  --amber:#854F0B;--amber-light:#FAEEDA;
  --blue:#185FA5;--blue-light:#E6F1FB;
  --red:#A32D2D;--red-light:#FCEBEB;
  --green:#3B6D11;--green-light:#EAF3DE;
  --bg:#F8F8F6;--surface:#FFFFFF;
  --border:rgba(0,0,0,0.09);--border-med:rgba(0,0,0,0.15);
  --text:#1A1A1A;--text-2:#666660;--text-3:#999993;
  --radius:12px;--radius-sm:8px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
.dark{
  --bg:#111112;--surface:#1C1C1E;
  --border:rgba(255,255,255,0.08);--border-med:rgba(255,255,255,0.15);
  --text:#F2F2F7;--text-2:#A0A0A8;--text-3:#58585F;
  --purple-light:#2A2660;--purple-dark:#A09CE8;
  --teal-light:#0A2E24;--teal:#3DD68C;
  --amber-light:#2E1F06;--amber:#EFA827;
  --blue-light:#0A1F38;--blue:#5AABF7;
  --red-light:#2E0A0A;--red:#F07070;
  --green-light:#0D2010;--green:#6FCF6F;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,'Helvetica Neue',sans-serif;color:var(--text);transition:background .25s,color .25s}
.app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;background:var(--bg)}
.header{background:var(--surface);border-bottom:0.5px solid var(--border);padding:52px 20px 14px;flex-shrink:0;display:flex;align-items:flex-end;justify-content:space-between}
.header-title{font-size:22px;font-weight:600;color:var(--text)}
.header-sub{font-size:13px;color:var(--text-2);margin-top:2px}
.ios-toggle{position:relative;width:44px;height:26px;flex-shrink:0}
.ios-toggle input{opacity:0;width:0;height:0;position:absolute}
.ios-track{position:absolute;inset:0;background:var(--border-med);border-radius:13px;transition:background .25s;cursor:pointer}
.ios-track::after{content:'';position:absolute;left:3px;top:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .25s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.ios-toggle input:checked+.ios-track{background:var(--purple)}
.ios-toggle input:checked+.ios-track::after{transform:translateX(18px)}
.body{flex:1;overflow-y:auto;padding:16px;padding-bottom:calc(76px + var(--safe-bottom));-webkit-overflow-scrolling:touch}
.nav{display:grid;grid-template-columns:repeat(6,1fr);background:var(--surface);border-top:0.5px solid var(--border);padding-bottom:var(--safe-bottom);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px 6px;border:none;background:transparent;font-size:9px;color:var(--text-3);cursor:pointer;transition:color .15s}
.nav-btn.active{color:var(--purple)}
.nav-btn svg{width:20px;height:20px;stroke-width:1.8}
.page{display:none}.page.active{display:block}
.card{background:var(--surface);border-radius:var(--radius);border:0.5px solid var(--border);padding:14px 16px;margin-bottom:10px}
.card-sm{padding:10px 14px}
.sec{font-size:11px;font-weight:600;color:var(--text-2);letter-spacing:.6px;text-transform:uppercase;margin:16px 0 8px}
.prog{height:4px;background:var(--bg);border-radius:2px;margin-top:8px}
.prog-fill{height:4px;border-radius:2px;background:var(--purple);transition:width .3s}
.badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:500}
.badge-reading{background:var(--purple-light);color:var(--purple-dark)}
.badge-done{background:var(--teal-light);color:var(--teal)}
.badge-want{background:var(--bg);color:var(--text-2);border:0.5px solid var(--border-med)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;border:none;transition:transform .1s}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--purple);color:#fff}
.btn-ghost{background:var(--purple-light);color:var(--purple-dark)}
.btn-danger{background:var(--red-light);color:var(--red)}
.btn-full{width:100%;justify-content:center}
.btn-sm{padding:7px 14px;font-size:13px}
.timer-hero{background:var(--purple-light);border-radius:var(--radius);padding:20px;text-align:center;margin-bottom:16px}
.timer-label{font-size:13px;color:var(--purple-dark);margin-bottom:6px}
.timer-display{font-size:48px;font-weight:300;color:var(--purple-dark);letter-spacing:3px;font-variant-numeric:tabular-nums;margin-bottom:14px}
.timer-btns{display:flex;gap:10px;justify-content:center}
.row-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:0.5px solid var(--border)}
.row-item:last-child{border-bottom:none}
.icon-circle{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.icon-circle svg{width:18px;height:18px;stroke-width:2}
.ic-purple{background:var(--purple-light);color:var(--purple)}
.ic-teal{background:var(--teal-light);color:var(--teal)}
.ic-amber{background:var(--amber-light);color:var(--amber)}
.row-main{flex:1;min-width:0}
.row-title{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.row-sub{font-size:12px;color:var(--text-2);margin-top:1px}
.period-tabs,.review-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.rtab{padding:7px 16px;border-radius:99px;font-size:13px;font-weight:500;border:0.5px solid var(--border-med);background:transparent;color:var(--text-2);cursor:pointer;transition:all .15s}
.rtab.active{background:var(--purple);color:white;border-color:var(--purple)}
.review-q{font-size:13px;font-weight:500;color:var(--text-2);margin-bottom:6px}
textarea{width:100%;border:0.5px solid var(--border-med);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;font-family:inherit;color:var(--text);background:var(--surface);resize:none;line-height:1.6}
textarea:focus{outline:none;border-color:var(--purple)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:430px;padding-bottom:calc(24px + var(--safe-bottom));max-height:88vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:600;margin-bottom:16px;color:var(--text)}
.modal-close{float:right;background:var(--bg);border:none;width:28px;height:28px;border-radius:50%;font-size:16px;cursor:pointer;color:var(--text-2);display:flex;align-items:center;justify-content:center}
input[type=text],input[type=number],input[type=date],input[type=time]{width:100%;border:0.5px solid var(--border-med);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;font-family:inherit;color:var(--text);background:var(--surface)}
input:focus{outline:none;border-color:var(--purple)}
.field{margin-bottom:12px}
.field label{display:block;font-size:13px;color:var(--text-2);margin-bottom:5px}
select{width:100%;border:0.5px solid var(--border-med);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;font-family:inherit;color:var(--text);background:var(--surface)}
select:focus{outline:none;border-color:var(--purple)}
.add-row{display:flex;align-items:center;gap:8px;padding:12px 0 0;color:var(--purple);font-size:14px;font-weight:500;cursor:pointer;border:none;background:transparent}
.add-row svg{width:18px;height:18px;stroke-width:2.5}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--surface);padding:10px 20px;border-radius:99px;font-size:13px;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.chip-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.chip{padding:5px 14px;border-radius:99px;font-size:13px;border:0.5px solid var(--border-med);background:transparent;color:var(--text-2);cursor:pointer}
.chip.active{background:var(--purple);color:white;border-color:var(--purple)}
.empty{text-align:center;padding:24px 20px;color:var(--text-3);font-size:14px}
.home-section{background:var(--surface);border-radius:var(--radius);border:0.5px solid var(--border);padding:14px 16px;margin-bottom:10px}
.home-section-title{font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.home-stat-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid var(--border)}
.home-stat-row:last-child{border-bottom:none}
.home-stat-label{font-size:14px;color:var(--text)}
.home-stat-val{font-size:14px;font-weight:500}
.val-done{color:var(--teal)}.val-pending{color:var(--text-3)}.val-read{color:var(--purple)}.val-med{color:var(--amber)}
.week-dots{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:8px}
.wd-col{display:flex;flex-direction:column;align-items:center;gap:3px}
.wd-name{font-size:9px;color:var(--text-3)}
.wd-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.wd-done{background:var(--teal-light);color:var(--teal)}
.wd-done-p{background:var(--purple-light);color:var(--purple)}
.wd-done-a{background:var(--amber-light);color:var(--amber)}
.wd-empty{background:var(--bg);border:0.5px solid var(--border-med)}
.wd-today{outline:2px solid var(--purple);outline-offset:1px}
.case-check{width:24px;height:24px;border-radius:6px;border:1.5px solid var(--border-med);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;cursor:pointer}
.case-check.done{background:var(--teal);border-color:var(--teal)}
.urgent-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ud-red{background:var(--red)}.ud-green{background:var(--teal)}
.med-ring-wrap{position:relative;width:180px;height:180px;margin:0 auto 16px}
.med-ring-wrap svg{position:absolute;top:0;left:0}
.med-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.med-time{font-size:36px;font-weight:300;color:var(--purple-dark);letter-spacing:2px}
.med-sub{font-size:12px;color:var(--purple-dark);margin-top:4px}
.icon-btn{background:none;border:none;color:var(--text-3);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:background .15s}
.icon-btn:hover{background:var(--bg)}
/* 長條圖 */
.bar-chart{display:flex;align-items:flex-end;gap:3px;height:60px;margin:8px 0 4px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.bar-wrap{flex:1;display:flex;align-items:flex-end;width:100%}
.bar-fill{width:100%;border-radius:3px 3px 0 0;background:var(--purple);min-height:2px;transition:height .3s}
.bar-label{font-size:9px;color:var(--text-3)}
.bar-val{font-size:9px;color:var(--purple);font-weight:500}
/* 本月圓圈 */
.month-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.mc-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text-3)}
.mc-done-p{background:var(--purple-light);color:var(--purple)}
.mc-done-t{background:var(--teal-light);color:var(--teal)}
.mc-done-a{background:var(--amber-light);color:var(--amber)}
.mc-empty{background:var(--bg);border:0.5px solid var(--border-med)}
.mc-future{background:transparent;border:none}
/* 運動菜單 */
.move-row{display:flex;gap:6px;align-items:center;margin-bottom:8px}
.move-row input{border:0.5px solid var(--border-med);border-radius:var(--radius-sm);padding:7px 10px;font-size:13px;font-family:inherit;color:var(--text);background:var(--surface)}
.move-name{flex:3}
.move-sets{flex:1;text-align:center}
.move-reps{flex:1;text-align:center}
.move-del{background:none;border:none;color:var(--text-3);cursor:pointer;font-size:16px;padding:4px;flex-shrink:0}
.review-entry{border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;background:var(--bg)}
.review-entry-date{font-size:12px;color:var(--text-3);margin-bottom:6px}
.review-entry-q{font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:2px}
.review-entry-a{font-size:13px;color:var(--text);margin-bottom:8px;white-space:pre-wrap}
.review-entry-a:last-child{margin-bottom:0}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <div>
    <div class="header-title" id="header-title">今天</div>
    <div class="header-sub" id="header-sub"></div>
  </div>
  <label class="ios-toggle" title="深色模式">
    <input type="checkbox" id="dark-chk" onchange="toggleDark(this.checked)">
    <span class="ios-track"></span>
  </label>
</div>
<div class="body">

<!-- 首頁 -->
<div class="page active" id="page-home">
  <div class="period-tabs">
    <button class="rtab active" onclick="setPeriod('today',this)">今天</button>
    <button class="rtab" onclick="setPeriod('week',this)">本週</button>
    <button class="rtab" onclick="setPeriod('month',this)">本月</button>
  </div>
  <div id="home-dashboard"></div>
  <div class="sec">閱讀中</div>
  <div id="home-reading-list"></div>
  <div class="sec" id="home-case-sec" style="display:none">個案待寫</div>
  <div id="home-case-list"></div>
  <div style="margin-top:16px">
    <button class="btn btn-ghost btn-full" onclick="openModal('export-pick')">匯出 AI 分析報告</button>
  </div>
</div>

<!-- 讀書 -->
<div class="page" id="page-books">
  <div class="timer-hero" id="timer-hero" style="display:none">
    <div class="timer-label" id="timer-book-label">讀書計時中</div>
    <div class="timer-display" id="timer-display">00:00:00</div>
    <div class="timer-btns">
      <button class="btn btn-primary" onclick="stopTimer()">結束計時</button>
      <button class="btn btn-ghost" id="timer-pause-btn" onclick="pauseTimer()">暫停</button>
    </div>
  </div>
  <div class="chip-row" id="book-filter">
    <button class="chip active" onclick="filterBooks('all',this)">全部</button>
    <button class="chip" onclick="filterBooks('reading',this)">閱讀中</button>
    <button class="chip" onclick="filterBooks('want',this)">待看</button>
    <button class="chip" onclick="filterBooks('done',this)">已完成</button>
  </div>
  <div id="book-list"></div>
  <button class="add-row" onclick="openModal('book')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>新增書籍
  </button>
</div>

<!-- 運動 -->
<div class="page" id="page-exercise">
  <div class="sec" style="margin-top:4px">本週紀錄</div>
  <div class="card">
    <div class="week-dots" id="ex-week-grid"></div>
    <div style="text-align:center;font-size:13px;color:var(--teal);margin-top:8px" id="ex-week-summary"></div>
  </div>
  <div class="sec">運動紀錄</div>
  <div class="card card-sm" id="exercise-list"></div>
  <div style="display:flex;gap:16px;flex-wrap:wrap;padding-top:4px">
    <button class="add-row" onclick="openExerciseModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>記錄今日運動
    </button>
    <button class="add-row" style="color:var(--text-2)" onclick="openModal('workout-menus');renderWorkoutMenuList()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>管理菜單
    </button>
  </div>
</div>

<!-- 冥想 -->
<div class="page" id="page-meditate">
  <div class="card" style="text-align:center;padding:24px 16px;margin-bottom:10px">
    <div class="med-ring-wrap">
      <svg width="180" height="180">
        <circle cx="90" cy="90" r="80" fill="none" stroke="var(--purple-light)" stroke-width="10"/>
        <circle cx="90" cy="90" r="80" fill="none" stroke="var(--purple)" stroke-width="10"
          stroke-linecap="round" stroke-dasharray="502" stroke-dashoffset="502"
          transform="rotate(-90 90 90)" id="med-progress-ring"/>
      </svg>
      <div class="med-center">
        <div class="med-time" id="med-display">15:00</div>
        <div class="med-sub" id="med-sub">選擇時長開始</div>
      </div>
    </div>
    <div class="chip-row" style="justify-content:center;margin-bottom:12px" id="med-presets">
      <button class="chip" onclick="setMedDuration(5,this)">5分</button>
      <button class="chip" onclick="setMedDuration(10,this)">10分</button>
      <button class="chip active" onclick="setMedDuration(15,this)">15分</button>
      <button class="chip" onclick="setMedDuration(20,this)">20分</button>
      <button class="chip" onclick="setMedDuration(30,this)">30分</button>
    </div>
    <div style="display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:14px">
      <input type="number" id="med-custom-min" placeholder="自訂分鐘" min="1" max="120" style="width:120px;text-align:center">
      <button class="btn btn-ghost btn-sm" onclick="applyCustomMed()">設定</button>
    </div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn btn-primary" id="med-start-btn" onclick="toggleMed()">開始冥想</button>
      <button class="btn btn-ghost" onclick="resetMed()">重置</button>
    </div>
  </div>
  <div class="sec">冥想紀錄</div>
  <div class="card card-sm" id="med-history"></div>
</div>

<!-- 個案 -->
<div class="page" id="page-cases">
  <div class="chip-row">
    <button class="chip active" onclick="filterCases('pending',this)">待撰寫</button>
    <button class="chip" onclick="filterCases('done',this)">今日完成</button>
    <button class="chip" onclick="filterCases('all',this)">全部個案</button>
  </div>
  <div id="case-list"></div>
  <div style="display:flex;gap:16px;padding-top:4px;flex-wrap:wrap">
    <button class="add-row" onclick="openModal('case')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>新增個案
    </button>
    <button class="add-row" style="color:var(--red)" onclick="openModal('quickcase')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>臨時個案
    </button>
  </div>
</div>

<!-- 回顧 -->
<div class="page" id="page-review">
  <div class="review-tabs">
    <button class="rtab active" onclick="setReview('daily',this)">每日</button>
    <button class="rtab" onclick="setReview('weekly',this)">每週</button>
    <button class="rtab" onclick="setReview('monthly',this)">每月</button>
  </div>
  <div id="review-body"></div>
  <div class="sec" style="margin-top:20px">歷史回顧</div>
  <div id="review-history"></div>
</div>

</div>
<nav class="nav">
  <button class="nav-btn active" id="nav-home" onclick="switchPage('home',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>首頁</button>
  <button class="nav-btn" id="nav-books" onclick="switchPage('books',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>讀書</button>

<script>
// ── 資料 ──────────────────────────────────────────────
function load(k,d){try{return JSON.parse(localStorage.getItem(k))??d;}catch{return d;}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v));}
var books=load('lm-books',[]);
var exercises=load('lm-exercises',[]);
var reviews=load('lm-reviews',{});
var readSessions=load('lm-sessions',[]);
var medSessions=load('lm-med',[]);
var cases=load('lm-cases',[]);
var isDark=load('lm-dark',false);

// ── 工具 ──────────────────────────────────────────────
function today(){return new Date().toISOString().slice(0,10);}
function todayLabel(){var d=new Date(),days=['日','一','二','三','四','五','六'];return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 週'+days[d.getDay()];}
function weekDates(){var d=new Date(),day=d.getDay(),mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1));var a=[];for(var i=0;i<7;i++){var x=new Date(mon);x.setDate(mon.getDate()+i);a.push(x.toISOString().slice(0,10));}return a;}
function monthDates(){var d=new Date(),a=[];for(var i=1;i<=d.getDate();i++){var x=new Date(d.getFullYear(),d.getMonth(),i);a.push(x.toISOString().slice(0,10));}return a;}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}
function fmt(sec){var h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;return(h?(h<10?'0':'')+h+':':'')+(m<10?'0':'')+m+':'+(s<10?'0':'')+s;}
function fmtMin(sec){var m=Math.floor(sec/60),s=sec%60;return(m<10?'0':'')+m+':'+(s<10?'0':'')+s;}

// ── 深色模式 ──────────────────────────────────────────
function toggleDark(on){isDark=on;save('lm-dark',isDark);document.body.classList.toggle('dark',isDark);}

// ── 導航 ──────────────────────────────────────────────
var currentPage='home';
var pageTitles={home:'今天',books:'讀書紀錄',exercise:'運動紀錄',meditate:'冥想',cases:'個案紀錄',review:'回顧'};
function switchPage(name,btn){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('page-'+name).classList.add('active');
  if(btn)btn.classList.add('active');
  currentPage=name;
  document.getElementById('header-title').textContent=pageTitles[name];
  document.getElementById('header-sub').textContent=name==='home'?todayLabel():'';
  if(name==='home')renderHome();
  if(name==='books')renderBooks();
  if(name==='exercise')renderExercise();
  if(name==='meditate')renderMedHistory();
  if(name==='cases')renderCases();
  if(name==='review')renderReview();
}

// ── 首頁 ──────────────────────────────────────────────
var homePeriod='today';
function setPeriod(p,btn){
  homePeriod=p;
  document.querySelectorAll('.period-tabs .rtab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');renderHome();
}
function weekDotsHTML(dates,hasFn,colorClass){
  var days=['一','二','三','四','五','六','日'],t=today();
  return '<div class="week-dots">'+dates.map(function(d,i){
    var has=hasFn(d),isT=d===t;
    return '<div class="wd-col"><div class="wd-name">'+days[i]+'</div>'
      +'<div class="wd-dot '+(has?colorClass:'wd-empty')+(isT?' wd-today':'')+'">'
      +(has?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':'')
      +'</div></div>';
  }).join('')+'</div>';
}
function renderHome(){
  var t=today(),wd=weekDates(),md=monthDates(),dash=document.getElementById('home-dashboard');
  if(homePeriod==='today'){
    var rSec=readSessions.filter(function(s){return s.date===t;}).reduce(function(a,s){return a+s.sec;},0);
    var hasEx=exercises.some(function(e){return e.date===t;});
    var mSec=medSessions.filter(function(s){return s.date===t;}).reduce(function(a,s){return a+s.sec;},0);
    dash.innerHTML='<div class="home-section"><div class="home-section-title">今日概覽</div>'
      +'<div class="home-stat-row"><span class="home-stat-label">讀書</span><span class="home-stat-val val-read">'+(rSec>0?Math.round(rSec/60)+' 分鐘':'尚未開始')+'</span></div>'
      +'<div class="home-stat-row"><span class="home-stat-label">運動</span><span class="home-stat-val '+(hasEx?'val-done':'val-pending')+'">'+(hasEx?'已完成':'尚未進行')+'</span></div>'
      +'<div class="home-stat-row"><span class="home-stat-label">冥想</span><span class="home-stat-val val-med">'+(mSec>0?Math.round(mSec/60)+' 分鐘':'尚未開始')+'</span></div>'
      +'</div>';
  } else if(homePeriod==='week'){
    var rSecW=readSessions.filter(function(s){return wd.indexOf(s.date)>=0;}).reduce(function(a,s){return a+s.sec;},0);
    var mSecW=medSessions.filter(function(s){return wd.indexOf(s.date)>=0;}).reduce(function(a,s){return a+s.sec;},0);
    var exDaysW=wd.filter(function(d){return exercises.some(function(e){return e.date===d;});}).length;
    dash.innerHTML='<div class="home-section"><div class="home-section-title">本週概覽</div>'
      +'<div style="margin-bottom:12px"><div style="font-size:12px;color:var(--text-2);margin-bottom:4px">讀書</div>'
      +weekDotsHTML(wd,function(d){return readSessions.some(function(s){return s.date===d;});},'wd-done-p')
      +'<div style="font-size:12px;color:var(--text-2);margin-top:5px;text-align:center">本週共 '+Math.round(rSecW/360)/10+' 小時</div></div>'
      +'<div style="margin-bottom:12px"><div style="font-size:12px;color:var(--text-2);margin-bottom:4px">運動</div>'
      +weekDotsHTML(wd,function(d){return exercises.some(function(e){return e.date===d;});},'wd-done')
      +'<div style="font-size:12px;color:var(--text-2);margin-top:5px;text-align:center">本週共 '+exDaysW+' 天</div></div>'
      +'<div><div style="font-size:12px;color:var(--text-2);margin-bottom:4px">冥想</div>'
      +weekDotsHTML(wd,function(d){return medSessions.some(function(s){return s.date===d;});},'wd-done-a')
      +'<div style="font-size:12px;color:var(--text-2);margin-top:5px;text-align:center">本週共 '+Math.round(mSecW/360)/10+' 小時</div></div>'
      +'</div>';
  } else {
    var rD=md.filter(function(d){return readSessions.some(function(s){return s.date===d;});}).length;
    var eD=md.filter(function(d){return exercises.some(function(e){return e.date===d;});}).length;
    var mD=md.filter(function(d){return medSessions.some(function(s){return s.date===d;});}).length;
    dash.innerHTML='<div class="home-section"><div class="home-section-title">本月概覽（共'+md.length+'天）</div>'
      +'<div class="home-stat-row"><span class="home-stat-label">讀書</span><span class="home-stat-val val-read">'+rD+' 天</span></div>'
      +'<div class="home-stat-row"><span class="home-stat-label">運動</span><span class="home-stat-val val-done">'+eD+' 天</span></div>'
      +'<div class="home-stat-row"><span class="home-stat-label">冥想</span><span class="home-stat-val val-med">'+mD+' 天</span></div>'
      +'</div>';
  }
  // 閱讀中
  var reading=books.filter(function(b){return b.status==='reading';});
  var rl=document.getElementById('home-reading-list');
  rl.innerHTML=reading.length?reading.slice(0,2).map(function(b){
    var pct=b.pages?Math.round((b.currentPage||0)/b.pages*100):0;
    return '<div class="card" style="margin-bottom:8px"><div class="row-item" style="border:none;padding:0;margin-bottom:6px">'
      +'<div class="icon-circle ic-purple"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg></div>'

function exportData(){

  lines.push('');

  var rSess=readSessions.filter(function(s){return s.date>=from&&s.date<=to;});
  if(rSess.length){
    var totalSec=rSess.reduce(function(a,s){return a+s.sec;},0);
    var totalPages=rSess.reduce(function(a,s){return a+(s.pagesRead||0);},0);
    lines.push('總計：'+Math.round(totalSec/60)+'分鐘，共讀'+totalPages+'頁');

    });
    Object.keys(bMap).forEach(function(title){
      var ss=bMap[title];
      lines.push('  ['+title+'] '+Math.round(ss.reduce(function(a,s){return a+s.sec;},0)/60)+'分鐘，'+ss.reduce(function(a,s){return a+(s.pagesRead||0);},0)+'頁，'+ss.length+'次');
    });
  } else lines.push('此區間無讀書紀錄');
  lines.push('');
  lines.push('書籍狀態：');
  books.forEach(function(b){
    var pct=b.pages?Math.round((b.currentPage||0)/b.pages*100):0;
    lines.push('  '+b.title+' ('+{'reading':'閱讀中','done':'已完成','want':'待看'}[b.status]+') 第'+(b.currentPage||0)+'/'+(b.pages||'?')+'頁 '+pct+'%');
  });
  lines.push('');
  lines.push('--- 運動紀錄 ---');
  var exF=exercises.filter(function(e){return e.date>=from&&e.date<=to;});
  if(exF.length){
    var exDays=[...new Set(exF.map(function(e){return e.date;}))].length;
    lines.push('共'+exDays+'天，'+exF.reduce(function(a,e){return a+e.min;},0)+'分鐘');
    exF.slice().reverse().forEach(function(e){lines.push('  '+e.date+' '+e.type+' '+e.min+'分鐘'+(e.note?' ('+e.note+')':''));});
  } else lines.push('此區間無運動紀錄');
  lines.push('');
  lines.push('--- 冥想紀錄 ---');
  var mF=medSessions.filter(function(s){return s.date>=from&&s.date<=to;});
  if(mF.length){
    var mDays=[...new Set(mF.map(function(s){return s.date;}))].length;
    lines.push('共'+mDays+'天，'+mF.reduce(function(a,s){return a+s.min;},0)+'分鐘');
    mF.slice().reverse().forEach(function(s){lines.push('  '+s.date+' '+s.min+'分鐘');});
  } else lines.push('此區間無冥想紀錄');
  lines.push('');
  lines.push('--- 個案紀錄撰寫狀況 ---');
  var cLines=[];
  cases.forEach(function(c){
    (c.sessions||[]).filter(function(s){return s.date>=from&&s.date<=to;}).forEach(function(s){
      cLines.push('  '+s.date+' '+c.code+(c.isQuick?' [臨時]':'')+' '+(s.written?'已完成':'未完成'));
    });
  });
  if(cLines.length)cLines.forEach(function(l){lines.push(l);});
  else lines.push('此區間無個案紀錄');
  lines.push('');
  lines.push('--- 個人回顧 ---');
  var qs={'daily':reviewQs.daily,'weekly':reviewQs.weekly,'monthly':reviewQs.monthly};
  var rKeys=Object.keys(reviews).filter(function(k){
    var d=reviews[k]._date;return d&&d>=from&&d<=to;
  }).sort().reverse();
  if(rKeys.length){
    rKeys.forEach(function(k){
      var data=reviews[k],mode=data._mode||'daily',mLabel={'daily':'每日','weekly':'每週','monthly':'每月'}[mode];
      lines.push('['+mLabel+' '+data._date+']');
      (qs[mode]||[]).forEach(function(q,i){if(data[i]&&data[i].trim())lines.push('  Q: '+q+'\n  A: '+data[i]);});
      lines.push('');
    });
  } else lines.push('此區間無回顧紀錄');
  lines.push('=== 報告結束 ===');
  lines.push('請根據以上數據，從人生教練和心理師的角度，幫我分析這段時間的生活狀況，指出值得肯定的地方和可以改善的方向。');
  document.getElementById('export-text').value=lines.join('\n');
  openModal('export');

var timerRunning=false,timerPaused=false,timerSec=0,timerInterval=null;
function filterBooks(f,btn){

function renderBooks(){
  var list=document.getElementById('book-list');

    var idx=books.indexOf(b);
    var pct=b.pages?Math.round((b.currentPage||0)/b.pages*100):0;
    var sessions=readSessions.filter(function(s){return s.bookId===b.id;});
    var lastSess=null;for(var i=sessions.length-1;i>=0;i--){if(sessions[i].rate){lastSess=sessions[i];break;}}
    var lastRate=lastSess?lastSess.rate:0;
    var eta='';
    if(lastRate&&b.pages&&(b.currentPage||0)<b.pages){var rm=Math.round((b.pages-b.currentPage)/lastRate*60);eta=rm<60?rm+'分':Math.floor(rm/60)+'時'+(rm%60?rm%60+'分':'');}
    var bCls=b.status==='reading'?'badge-reading':b.status==='done'?'badge-done':'badge-want';
    var bTxt=b.status==='reading'?'閱讀中':b.status==='done'?'已完成':'待看';

      +'<div class="row-item" style="border:none;padding:0;margin-bottom:'+(b.status==='reading'?'10':'0')+'px">'
      +'<div class="icon-circle ic-purple"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg></div>'
      +'<div class="row-main"><div class="row-title">'+b.title+'</div><div class="row-sub">'+b.author+'</div></div>'
      +'<button class="icon-btn" data-action="open-book-edit" data-idx="'+idx+'">···</button>'
      +'<span class="badge '+bCls+'">'+bTxt+'</span></div>'
      +(b.status==='reading'?
        '<div style="background:var(--bg);border-radius:var(--radius-sm);padding:10px;margin-bottom:10px">'
        +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;text-align:center">'
        +'<div><div style="font-size:10px;color:var(--text-2);margin-bottom:2px">進度</div><div style="font-size:15px;font-weight:600;color:var(--text)">'+pct+'%</div><div style="font-size:10px;color:var(--text-3)">第'+(b.currentPage||0)+'/'+(b.pages||'?')+'頁</div></div>'
        +'<div><div style="font-size:10px;color:var(--text-2);margin-bottom:2px">上次速率</div><div style="font-size:15px;font-weight:600;color:var(--text)">'+(lastRate||'—')+'</div><div style="font-size:10px;color:var(--text-3)">'+(lastRate?'頁/小時':'尚無紀錄')+'</div></div>'
        +'<div><div style="font-size:10px;color:var(--text-2);margin-bottom:2px">預計讀完</div><div style="font-size:13px;font-weight:600;color:var(--purple)">'+(eta||'—')+'</div><div style="font-size:10px;color:var(--text-3)">'+(eta?'還需':'')+'</div></div>'
        +'</div>'+(b.pages?'<div class="prog" style="margin-top:8px"><div class="prog-fill" style="width:'+pct+'%"></div></div>':'')+'</div>'
        +(isActive?
          '<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 2px"><span style="font-size:13px;color:var(--purple);font-weight:500">計時中 <span id="inline-timer">'+fmt(timerSec)+'</span></span>'
          +'<div style="display:flex;gap:8px"><button class="btn btn-ghost btn-sm" onclick="pauseTimer()">'+(timerPaused?'繼續':'暫停')+'</button><button class="btn btn-primary btn-sm" onclick="stopTimer()">結束</button></div></div>'
          :timerRunning?'<div style="font-size:12px;color:var(--text-3);text-align:center;padding:6px 0">另一本書計時中</div>'

      :'')+'</div>';
  }).join('');

// ── 計時器 ────────────────────────────────────────────
function startTimer(idx){
  if(timerRunning){showToast('請先結束目前的計時');return;}
  timerBookIdx=idx;timerSec=0;timerPaused=false;timerRunning=true;
  document.getElementById('timer-hero').style.display='block';
  document.getElementById('timer-book-label').textContent='《'+books[idx].title+'》讀書計時中';
  document.getElementById('timer-display').textContent='00:00:00';
  document.getElementById('timer-pause-btn').textContent='暫停';
  clearInterval(timerInterval);
  timerInterval=setInterval(function(){
    if(!timerPaused){timerSec++;document.getElementById('timer-display').textContent=fmt(timerSec);var il=document.getElementById('inline-timer');if(il)il.textContent=fmt(timerSec);}
  },1000);
  renderBooks();document.getElementById('page-books').scrollTop=0;
}
function pauseTimer(){timerPaused=!timerPaused;var btn=document.getElementById('timer-pause-btn');if(btn)btn.textContent=timerPaused?'繼續':'暫停';renderBooks();}
function stopTimer(){
  if(!timerRunning)return;
  clearInterval(timerInterval);timerPaused=false;
  var b=books[timerBookIdx];
  document.getElementById('s-duration').textContent=fmt(timerSec);
  var ep=document.getElementById('s-endpage');ep.value=b.currentPage||'';ep.min=b.currentPage||0;ep.max=b.pages||9999;
  document.getElementById('s-preview').style.display='none';ep.oninput=previewSession;
  openModal('session');
}
function previewSession(){
  var b=books[timerBookIdx],ep=parseInt(document.getElementById('s-endpage').value),sp=b.currentPage||0;
  if(!ep||ep<=sp){document.getElementById('s-preview').style.display='none';return;}
  var pr=ep-sp,hrs=timerSec/3600,rate=hrs>0?Math.round(pr/hrs):0;
  var pct=b.pages?Math.round(ep/b.pages*100):null,eta='';
  if(rate&&b.pages&&ep<b.pages){var rm=Math.round((b.pages-ep)/rate*60);eta=rm<60?rm+'分鐘':Math.floor(rm/60)+'小時'+(rm%60?rm%60+'分':'');}
  document.getElementById('s-pages-read').textContent=pr+' 頁';
  document.getElementById('s-rate').textContent=(rate||'—')+(rate?' 頁/時':'');
  document.getElementById('s-pct').textContent=(pct!==null?pct+'%':'—');
  document.getElementById('s-eta').textContent=eta||(b.pages&&ep>=b.pages?'已讀完':'—');
  document.getElementById('s-preview').style.display='block';
}
function saveSession(){
  var b=books[timerBookIdx],ep=parseInt(document.getElementById('s-endpage').value);
  if(!ep||ep<(b.currentPage||0)){showToast('請輸入有效頁數');return;}
  var sp=b.currentPage||0,pr=ep-sp,hrs=timerSec/3600,rate=hrs>0?Math.round(pr/hrs):0;
  readSessions.push({bookId:b.id,date:today(),sec:timerSec,startPage:sp,endPage:ep,pagesRead:pr,rate});
  save('lm-sessions',readSessions);
  books[timerBookIdx].currentPage=ep;
  if(b.pages&&ep>=b.pages)books[timerBookIdx].status='done';
  save('lm-books',books);
  timerRunning=false;timerSec=0;timerBookIdx=-1;
  document.getElementById('timer-hero').style.display='none';
  closeModal('session');renderBooks();showToast('讀書紀錄已儲存');
}

// ── 冥想 ──────────────────────────────────────────────
var medRunning=false,medPaused=false,medRemain=0,medTotal=15*60,medInterval=null;
function setMedDuration(min,btn){
  if(medRunning)return;
  medTotal=min*60;medRemain=medTotal;
  document.querySelectorAll('#med-presets .chip').forEach(function(c){c.classList.remove('active');});
  if(btn)btn.classList.add('active');
  document.getElementById('med-display').textContent=fmtMin(medRemain);
  document.getElementById('med-sub').textContent=min+'分鐘冥想';
  updateMedRing(0);
}
function applyCustomMed(){
  var min=parseInt(document.getElementById('med-custom-min').value);
  if(!min||min<1||min>120){showToast('請輸入 1-120 分鐘');return;}
  document.querySelectorAll('#med-presets .chip').forEach(function(c){c.classList.remove('active');});
  setMedDuration(min,null);
  document.getElementById('med-sub').textContent='自訂 '+min+' 分鐘';
}
function toggleMed(){
  var btn=document.getElementById('med-start-btn');
  if(!medRunning){
    if(medRemain===0)medRemain=medTotal;
    medRunning=true;medPaused=false;btn.textContent='暫停';
    medInterval=setInterval(function(){
      if(medPaused)return;
      medRemain--;
      document.getElementById('med-display').textContent=fmtMin(medRemain);
      updateMedRing((medTotal-medRemain)/medTotal);
      if(medRemain<=0){clearInterval(medInterval);medRunning=false;btn.textContent='開始冥想';medDone();}
    },1000);
  } else {medPaused=!medPaused;btn.textContent=medPaused?'繼續':'暫停';}
}
function updateMedRing(pct){
  var circ=2*Math.PI*80,offset=circ-(pct*circ);
  document.getElementById('med-progress-ring').setAttribute('stroke-dashoffset',offset.toFixed(1));
}
function resetMed(){
  clearInterval(medInterval);medRunning=false;medPaused=false;medRemain=medTotal;
  document.getElementById('med-display').textContent=fmtMin(medRemain);
  document.getElementById('med-sub').textContent='選擇時長開始';
  document.getElementById('med-start-btn').textContent='開始冥想';
  updateMedRing(0);
}
function medDone(){
  medSessions.push({id:String(Date.now()),date:today(),sec:medTotal,min:Math.round(medTotal/60)});
  save('lm-med',medSessions);renderMedHistory();
  document.getElementById('med-sub').textContent='完成';
  playBell();showToast('冥想完成');
}
function playBell(){
  try{var ctx=new(window.AudioContext||window.webkitAudioContext)();
  [0,0.4,1.0].forEach(function(delay){
    var o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='sine';o.frequency.value=528;
    g.gain.setValueAtTime(0.4,ctx.currentTime+delay);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+2.5);
    o.start(ctx.currentTime+delay);o.stop(ctx.currentTime+delay+2.5);
  });}catch(e){}
}
function renderMedHistory(){
  var list=document.getElementById('med-history');
  var recent=medSessions.slice().reverse().slice(0,10);
  if(!recent.length){list.innerHTML='<div class="empty">還沒有冥想紀錄</div>';return;}
  list.innerHTML=recent.map(function(s){
    return '<div class="row-item">'
      +'<div class="icon-circle ic-amber"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg></div>'
      +'<div class="row-main"><div class="row-title">冥想 '+s.min+' 分鐘</div><div class="row-sub">'+s.date+'</div></div>'
      +'<button class="icon-btn" data-action="del-med" data-sid="'+s.id+'">x</button>'
      +'</div>';
  }).join('');
}

// ── 個案 ──────────────────────────────────────────────
var caseFilter='pending';
function getPendingCases(){
  var t=today(),dow=new Date().getDay().toString();
  return cases.filter(function(c){
    var sessions=c.sessions||[];
    var todayDone=sessions.some(function(s){return s.date===t&&s.written;});
    if(todayDone)return false;
    if(c.isQuick)return sessions.some(function(s){return s.date===t;});
    return c.day&&c.day===dow;
  });
}
function filterCases(f,btn){
  caseFilter=f;
  document.querySelectorAll('#page-cases .chip').forEach(function(c){c.classList.remove('active');});
  btn.classList.add('active');renderCases();
}
function renderCases(){
  var list=document.getElementById('case-list'),t=today(),dow=new Date().getDay().toString();
  var filtered=caseFilter==='all'?cases
    :caseFilter==='pending'?getPendingCases()
    :cases.filter(function(c){return (c.sessions||[]).some(function(s){return s.date===t&&s.written;});});
  if(!filtered.length){list.innerHTML='<div class="empty">'+(caseFilter==='pending'?'今天沒有待寫紀錄':caseFilter==='done'?'今天還沒有完成的紀錄':'還沒有個案')+'</div>';return;}
  list.innerHTML=filtered.map(function(c){
    var sessions=c.sessions||[];
    var todaySess=sessions.find(function(s){return s.date===t;});
    var isWritten=todaySess&&todaySess.written;
    var showCheck=caseFilter!=='all';
    return '<div class="card card-sm" style="margin-bottom:8px">'
      +'<div style="display:flex;align-items:center;gap:10px">'
      +(showCheck?'<div class="case-check '+(isWritten?'done':'')+'" data-action="toggle-case" data-id="'+c.id+'">'
        +(isWritten?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':'')+'</div>':'')
      +'<div style="flex:1"><div style="font-size:14px;font-weight:500;color:var(--text)">'+c.code
        +(c.isQuick?' <span style="font-size:11px;color:var(--red);background:var(--red-light);padding:2px 6px;border-radius:99px">臨時</span>':'')+'</div>'
      +'<div style="font-size:12px;color:var(--text-2)">'+(c.sessionTime||'時間未設定')
        +(c.day?' · 週'+['','一','二','三','四','五'][parseInt(c.day)]:'')
        +(c.note?' · '+c.note:'')+'</div></div>'
      +'<button class="icon-btn" data-action="open-case-edit" data-id="'+c.id+'">···</button>'
      +'</div>'
      +(c.isQuick&&caseFilter==='pending'?
        '<div style="margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border);display:flex;justify-content:flex-end">'
        +'<button class="btn btn-danger btn-sm" data-action="del-quick-case" data-id="'+c.id+'" data-date="'+t+'">取消今日臨時個案</button>'
        +'</div>':'')
      +'</div>';
  }).join('');
}
function toggleCaseWritten(id){
  var t=today(),c=cases.find(function(x){return x.id===id;});
  if(!c)return;if(!c.sessions)c.sessions=[];
  var s=c.sessions.find(function(x){return x.date===t;});
  if(s)s.written=!s.written;else c.sessions.push({date:t,written:true});
  save('lm-cases',cases);renderCases();renderHome();
  showToast(s&&s.written?'已標記完成':'已取消完成');
}
function deleteQuickCaseSession(id,date){
  var c=cases.find(function(x){return x.id===id;});if(!c)return;
  c.sessions=(c.sessions||[]).filter(function(s){return s.date!==date;});
  if(c.isQuick&&c.sessions.length===0)cases=cases.filter(function(x){return x.id!==id;});
  save('lm-cases',cases);renderCases();renderHome();showToast('今日臨時個案已取消');
}
function openCaseEdit(id){
  var c=cases.find(function(x){return x.id===id;});if(!c)return;
  document.getElementById('ce-id').value=id;
  document.getElementById('ce-code').value=c.code;
  document.getElementById('ce-time').value=c.sessionTime||'';
  document.getElementById('ce-day').value=c.day||'';
  document.getElementById('ce-note').value=c.note||'';
  openModal('case-edit');
}
function saveCaseEdit(){
  var id=document.getElementById('ce-id').value;
  var c=cases.find(function(x){return x.id===id;});if(!c)return;
  c.code=document.getElementById('ce-code').value.trim()||c.code;
  c.sessionTime=document.getElementById('ce-time').value;
  c.day=document.getElementById('ce-day').value;
  c.note=document.getElementById('ce-note').value.trim();
  save('lm-cases',cases);closeModal('case-edit');renderCases();showToast('個案已更新');
}
function deleteCase(){
  var id=document.getElementById('ce-id').value;
  cases=cases.filter(function(x){return x.id!==id;});
  save('lm-cases',cases);closeModal('case-edit');renderCases();renderHome();showToast('個案已刪除');
}
function addCase(){
  var code=document.getElementById('c-code').value.trim();
  if(!code){showToast('請輸入個案代號');return;}
  cases.push({id:String(Date.now()),code,sessionTime:document.getElementById('c-time').value,day:document.getElementById('c-day').value,note:document.getElementById('c-note').value.trim(),sessions:[],isQuick:false});
  save('lm-cases',cases);closeModal('case');
  ['c-code','c-note'].forEach(function(i){document.getElementById(i).value='';});
  document.getElementById('c-time').value='';document.getElementById('c-day').value='';
  renderCases();showToast('個案已新增');
}
function addQuickCase(){
  var code=document.getElementById('qc-code').value.trim();
  if(!code){showToast('請輸入個案代號');return;}
  cases.push({id:String(Date.now()),code,sessionTime:document.getElementById('qc-time').value,note:document.getElementById('qc-note').value.trim(),sessions:[{date:today(),written:false}],isQuick:true});
  save('lm-cases',cases);closeModal('quickcase');
  ['qc-code','qc-note'].forEach(function(i){document.getElementById(i).value='';});
  document.getElementById('qc-time').value='';
  renderCases();renderHome();showToast('臨時個案已新增');
}

// ── 回顧 ──────────────────────────────────────────────
var reviewMode='daily';
var reviewQs={
  daily:['今天完成了什麼？','遇到什麼挑戰或收穫？','明天最重要的一件事？'],
  weekly:['這週完成了哪些目標？','這週最大的學習是什麼？','下週想改善什麼？'],
  monthly:['這個月有哪些重要成就？','哪些習慣需要加強？','下個月的核心目標？']
};
function setReview(mode,btn){
  reviewMode=mode;
  document.querySelectorAll('.review-tabs .rtab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');renderReview();
}
function renderReview(){
  var qs=reviewQs[reviewMode];
  document.getElementById('review-body').innerHTML=
    qs.map(function(q,i){
      return '<div class="card" style="margin-bottom:10px"><div class="review-q">'+q+'</div>'
        +'<textarea rows="3" id="rv-'+i+'" placeholder="寫下你的想法..."></textarea></div>';
    }).join('')
    +'<button class="btn btn-primary btn-full" onclick="saveReviewNow()">儲存這筆回顧</button>';
  renderReviewHistory();
}
function saveReviewNow(){
  var qs=reviewQs[reviewMode];
  var data={};var hasContent=false;
  qs.forEach(function(q,i){
    var el=document.getElementById('rv-'+i);
    if(el&&el.value.trim()){data[i]=el.value.trim();hasContent=true;}
  });
  if(!hasContent){showToast('請至少填寫一個欄位');return;}
  // key = mode-timestamp，每次存一筆新紀錄
  var key=reviewMode+'-'+Date.now();
  data._date=today();data._mode=reviewMode;
  reviews[key]=data;save('lm-reviews',reviews);
  // 清空輸入
  qs.forEach(function(q,i){var el=document.getElementById('rv-'+i);if(el)el.value='';});
  renderReviewHistory();showToast('回顧已儲存');
}
function renderReviewHistory(){
  var hist=document.getElementById('review-history');
  var qs=reviewQs[reviewMode];
  var prefix=reviewMode+'-';
  // 找出所有這個 mode 的紀錄
  var keys=Object.keys(reviews).filter(function(k){
    return k.indexOf(prefix)===0&&reviews[k]._mode===reviewMode&&Object.keys(reviews[k]).some(function(ki){return ki!=='_date'&&ki!=='_mode'&&reviews[k][ki]&&reviews[k][ki].trim();});
  });
  keys.sort().reverse();// 最新在前
  if(!keys.length){hist.innerHTML='<div class="empty">還沒有回顧紀錄</div>';return;}
  var modeLabel={'daily':'每日','weekly':'每週','monthly':'每月'}[reviewMode];
  hist.innerHTML=keys.slice(0,20).map(function(key){
    var data=reviews[key],dateStr=data._date||'';
    return '<div class="review-entry">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
      +'<div class="review-entry-date">'+modeLabel+' · '+dateStr+'</div>'
      +'<button class="icon-btn" style="font-size:14px;color:var(--red)" data-action="del-review" data-key="'+key+'">刪除</button>'
      +'</div>'
      +qs.map(function(q,i){
        return data[i]&&data[i].trim()?'<div class="review-entry-q">'+q+'</div><div class="review-entry-a">'+data[i]+'</div>':'';
      }).join('')
      +'</div>';
  }).join('');
}

// ── 事件委派 ──────────────────────────────────────────
document.body.addEventListener('click',function(e){
  var el=e.target.closest('[data-action]');
  if(!el)return;
  var action=el.dataset.action;
  if(action==='open-book-edit'){openBookEdit(parseInt(el.dataset.idx));}
  else if(action==='start-timer'){startTimer(parseInt(el.dataset.idx));}
  else if(action==='del-exercise'){
    // 用 id 而非 index 刪除，更安全
    var eid=el.dataset.eid;
    exercises=exercises.filter(function(e){return String(e.id)!==eid;});
    save('lm-exercises',exercises);renderExercise();showToast('運動紀錄已刪除');
  }
  else if(action==='del-med'){
    var sid=el.dataset.sid;
    medSessions=medSessions.filter(function(s){return String(s.id)!==sid;});
    save('lm-med',medSessions);renderMedHistory();showToast('冥想紀錄已刪除');
  }
  else if(action==='toggle-case'){toggleCaseWritten(el.dataset.id);}
  else if(action==='open-case-edit'){openCaseEdit(el.dataset.id);}
  else if(action==='del-quick-case'){deleteQuickCaseSession(el.dataset.id,el.dataset.date);}
  else if(action==='del-review'){
    var rkey=el.dataset.key;
    delete reviews[rkey];save('lm-reviews',reviews);renderReviewHistory();showToast('已刪除');
  }
});

// ── Modal ─────────────────────────────────────────────
function openModal(n){
  if(n==='export-pick'){
    var f=new Date();f.setDate(f.getDate()-7);
    document.getElementById('export-from').value=f.toISOString().slice(0,10);
    document.getElementById('export-to').value=today();
  }
  document.getElementById('modal-'+n).classList.add('open');
}
function closeModal(n){document.getElementById('modal-'+n).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(function(el){
  el.addEventListener('click',function(e){if(e.target===el)el.classList.remove('open');});
});

// ── 全螢幕 ────────────────────────────────────────────
document.addEventListener('click',function onFirst(){
  var el=document.documentElement;
  if(el.requestFullscreen)el.requestFullscreen();
  else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
  document.removeEventListener('click',onFirst);
},{once:true});

// ── Init ──────────────────────────────────────────────
document.getElementById('header-sub').textContent=todayLabel();
if(isDark){document.body.classList.add('dark');document.getElementById('dark-chk').checked=true;}
renderHome();renderReview();
setMedDuration(15,document.querySelectorAll('#med-presets .chip')[2]);
</script>

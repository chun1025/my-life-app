name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Pre-link JDK and Android SDK for Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          ln -s $JAVA_HOME ~/.bubblewrap/jdk
          ln -s $ANDROID_SDK_ROOT ~/.bubblewrap/android_sdk

      - name: Build APK
        run: printf 'beingapp2024\nbeingapp2024\n' | bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: being-apk
          path: '**/*.apk'
          retention-days: 90

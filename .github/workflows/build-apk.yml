name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup build tools
        run: |
          sudo apt-get install -y expect
          npm install -g @bubblewrap/cli

      - name: Pre-configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          ASDK="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ASDK"
          }
          EOF
          echo "JDK: $JAVA_HOME"
          echo "Android SDK: $ASDK"
          if [ ! -f android.keystore ]; then
            keytool -genkeypair \
              -keystore android.keystore -alias android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass beingapp2024 -keypass beingapp2024 \
              -dname "CN=Being,O=Being,C=TW" -noprompt
          else
            echo "Keystore already exists, skipping generation."
          fi

      - name: Build APK
        timeout-minutes: 30
        run: |
          cat > /tmp/bw.exp << 'EXPEOF'
#!/usr/bin/expect -f
set timeout 900
spawn bubblewrap build
expect {
  -re {install.*JDK.*\(Y/n\)}          { send "y\r"; exp_continue }
  -re {install.*Android SDK.*\(Y/n\)}  { send "y\r"; exp_continue }
  -re {regenerate.*\(Y/n\)}            { send "n\r"; exp_continue }
  -re {regenerate.*project}            { send "n\r"; exp_continue }
  -re {up-to-date.*\(Y/n\)}            { send "n\r"; exp_continue }
  -re {(?i)password}                   { send "beingapp2024\r"; exp_continue }
  eof
}
EXPEOF
          expect /tmp/bw.exp

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: being-apk
          path: '**/*.apk'
          retention-days: 90

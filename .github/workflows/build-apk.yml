name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup build tools
        run: |
          sudo apt-get install -y expect
          npm install -g @bubblewrap/cli

      - name: Pre-configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\": \"$JAVA_HOME\"}" > ~/.bubblewrap/config.json
          echo "JDK: $JAVA_HOME"
          cat ~/.bubblewrap/config.json
          if [ ! -f android.keystore ]; then
            keytool -genkeypair \
              -keystore android.keystore -alias android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass beingapp2024 -keypass beingapp2024 \
              -dname "CN=Being,O=Being,C=TW" -noprompt
          else
            echo "Keystore already exists, skipping."
          fi

      - name: Build APK
        timeout-minutes: 45
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: beingapp2024
          BUBBLEWRAP_KEY_PASSWORD: beingapp2024
        run: expect build.exp

      - name: List APK files
        if: always()
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f || echo "No APK found"
          echo "=== Project structure ==="
          ls -la

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: being-apk
          path: '**/*.apk'
          retention-days: 90
          if-no-files-found: warn

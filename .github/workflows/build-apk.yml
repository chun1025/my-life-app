name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup build tools
        run: |
          sudo apt-get install -y expect
          npm install -g @bubblewrap/cli

      - name: Pre-configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          ASDK="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          echo "{\"jdkPath\": \"$JAVA_HOME\", \"androidSdkPath\": \"$ASDK\"}" > ~/.bubblewrap/config.json
          echo "JDK: $JAVA_HOME"
          echo "Android SDK: $ASDK"
          cat ~/.bubblewrap/config.json
          if [ ! -f android.keystore ]; then
            keytool -genkeypair \
              -keystore android.keystore -alias android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass beingapp2024 -keypass beingapp2024 \
              -dname "CN=Being,O=Being,C=TW" -noprompt
          else
            echo "Keystore already exists, skipping."
          fi

      - name: Build APK
       timeout-minutes: 45
        run: expect build.exp

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: being-apk
          path: '**/*.apk'
          retention-days: 90
